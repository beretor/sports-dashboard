name: Update Sports Dashboard

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: update-dashboard
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    name: Fetch & Generate dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate data.json
        env:
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Récupère l'état exact du remote pour éviter tout conflit
          git fetch origin main
          git reset --soft origin/main

          git add docs/data.json

          if git diff --cached --quiet; then
            echo "Aucun changement — rien à committer."
          else
            git commit -m "chore: update dashboard data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push origin main
            echo "✅ data.json poussé."
          fi
